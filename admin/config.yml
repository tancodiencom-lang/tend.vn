# ═══════════════════════════════════════
# tenD — Sveltia CMS Configuration
# ═══════════════════════════════════════
# Sau khi tạo GitHub repo, thay đổi:
#   1. repo: YOUR_GITHUB_USERNAME/tend-website
#   2. base_url: URL của OAuth proxy (Cloudflare Worker)

backend:
  name: github
  repo: tancodiencom-lang/tend.vn   # ← ĐỔI THÀNH REPO CỦA BẠN
  branch: main
  auth_type: token

# Media / Ảnh
media_folder: "images"
public_folder: "/images"

# Slug settings
slug:
  encoding: "unicode"
  clean_accents: true

# ═══ COLLECTIONS ═══
collections:

  # ── THÔNG TIN DOANH NGHIỆP ──
  - name: "settings"
    label: "⚙️ Cài đặt chung"
    files:
      - name: "company"
        label: "Thông tin công ty"
        file: "data/company.json"
        fields:
          - { label: "Tên công ty", name: "company_name", widget: "string", default: "Công ty TNHH Tân Cổ Điển" }
          - { label: "Thương hiệu", name: "brand_name", widget: "string", default: "tenD" }
          - { label: "Hotline", name: "hotline", widget: "string", default: "0973.858.666" }
          - { label: "Email", name: "email", widget: "string", default: "info@tenD.vn" }
          - { label: "Website", name: "website", widget: "string", default: "tenD.vn" }
          - { label: "Địa chỉ VP", name: "office_address", widget: "string", default: "Tòa nhà CDS, 477 Minh Khai, Hai Bà Trưng, Hà Nội" }
          - { label: "Địa chỉ xưởng", name: "factory_address", widget: "string", default: "KCN Apec, Đa Hội, Từ Sơn, Bắc Ninh" }
          - { label: "Giờ làm việc", name: "working_hours", widget: "string", default: "8:00–18:00 · Thứ 2 – Thứ 7" }
          - { label: "Zalo link", name: "zalo_link", widget: "string", default: "https://zalo.me/0973858666" }
          - { label: "Slogan", name: "slogan", widget: "string", default: "Wake up your property." }

  # ── DỰ ÁN / PORTFOLIO ──
  - name: "projects"
    label: "🏠 Dự án"
    label_singular: "Dự án"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["year", "title"]
    fields:
      - { label: "Tên dự án", name: "title", widget: "string" }
      - { label: "Khu đô thị", name: "location", widget: "string" }
      - { label: "Tòa / Tầng", name: "building", widget: "string", required: false }
      - { label: "Diện tích (m²)", name: "area", widget: "number" }
      - { label: "Số phòng ngủ", name: "bedrooms", widget: "string" }
      - { label: "Phong cách", name: "style", widget: "select", options: ["Japandi", "Hiện đại", "Scandinavian", "Luxury", "Wabi-sabi", "Indochine", "Tân cổ điển"] }
      - { label: "Loại hình", name: "property_type", widget: "select", options: ["Chung cư", "Biệt thự", "Liền kề", "Shophouse"], default: "Chung cư" }
      - { label: "Thời gian thi công (ngày)", name: "duration", widget: "number", required: false }
      - { label: "Năm hoàn thiện", name: "year", widget: "number" }
      - { label: "Mục đích", name: "purpose", widget: "select", options: ["Để ở", "Cho thuê", "Ở + cho thuê"], default: "Ở + cho thuê" }
      - { label: "Giá thuê (triệu/tháng)", name: "rental_price", widget: "number", required: false }
      - { label: "Ảnh đại diện", name: "thumbnail", widget: "image", required: false }
      - { label: "Gallery ảnh", name: "gallery", widget: "list", required: false, field: { label: "Ảnh", name: "image", widget: "image" } }
      - { label: "Câu chuyện dự án", name: "story", widget: "markdown", required: false }
      - { label: "Hiển thị", name: "visible", widget: "boolean", default: true }

  # ── BLOG - CHUNG CƯ ──
  - name: "blog_apartment"
    label: "📝 Blog Chung cư"
    label_singular: "Bài viết"
    folder: "content/blog/apartment"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Tiêu đề", name: "title", widget: "string" }
      - { label: "Slug URL", name: "slug", widget: "string" }
      - { label: "Ngày đăng", name: "date", widget: "datetime" }
      - { label: "Danh mục", name: "category", widget: "select", options: ["Hướng dẫn", "Tài chính", "Thiết kế", "Kinh nghiệm", "Vinhomes"] }
      - { label: "Thời gian đọc (phút)", name: "read_time", widget: "number", default: 5 }
      - { label: "Ảnh đại diện", name: "thumbnail", widget: "image", required: false }
      - { label: "Mô tả ngắn", name: "excerpt", widget: "text" }
      - { label: "Nội dung", name: "body", widget: "markdown" }
      - { label: "Bài liên quan", name: "related", widget: "list", required: false, field: { label: "Slug bài", name: "slug", widget: "string" } }

  # ── BLOG - BIỆT THỰ ──
  - name: "blog_villa"
    label: "📝 Blog Biệt thự"
    label_singular: "Bài viết"
    folder: "content/blog/villa"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Tiêu đề", name: "title", widget: "string" }
      - { label: "Slug URL", name: "slug", widget: "string" }
      - { label: "Ngày đăng", name: "date", widget: "datetime" }
      - { label: "Danh mục", name: "category", widget: "select", options: ["Tài chính · Biệt thự", "Thiết kế · Biệt thự", "Vinhomes · Biệt thự", "Kinh nghiệm · Biệt thự"] }
      - { label: "Thời gian đọc (phút)", name: "read_time", widget: "number", default: 5 }
      - { label: "Ảnh đại diện", name: "thumbnail", widget: "image", required: false }
      - { label: "Mô tả ngắn", name: "excerpt", widget: "text" }
      - { label: "Nội dung", name: "body", widget: "markdown" }

  # ── NỘI DUNG TRANG CHỦ ──
  - name: "pages"
    label: "📄 Nội dung trang"
    files:
      - name: "homepage"
        label: "Trang chủ"
        file: "data/homepage.json"
        fields:
          - { label: "Hero Question", name: "hero_question", widget: "string", default: "Đã bao lâu rồi bạn chưa ghé căn nhà của mình ở Vinhomes?" }
          - { label: "Hero Sub", name: "hero_sub", widget: "text" }
          - { label: "S6 CTA Title", name: "s6_title", widget: "string", default: "Căn nhà của bạn đã chờ đủ lâu rồi." }
          - { label: "S6 CTA Sub", name: "s6_sub", widget: "text" }

      - name: "about"
        label: "Về tenD"
        file: "data/about.json"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Body", name: "hero_body", widget: "text" }
          - { label: "Câu chuyện", name: "story", widget: "markdown" }
          - { label: "Pull Quote", name: "pull_quote", widget: "text" }
          - label: "Giá trị cốt lõi"
            name: "values"
            widget: "list"
            max: 3
            fields:
              - { label: "Icon", name: "icon", widget: "string" }
              - { label: "Tiêu đề", name: "title", widget: "string" }
              - { label: "Mô tả", name: "body", widget: "text" }
