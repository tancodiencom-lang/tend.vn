backend:
  name: github
  repo: tancodiencom-lang/tend.vn
  branch: main
  base_url: https://sveltia-cms-auth.xxx.workers.dev

media_folder: "images"
public_folder: "/images"

slug:
  encoding: "unicode"
  clean_accents: true

collections:

  # ── CÀI ĐẶT CHUNG ──
  - name: "settings"
    label: "⚙️ Cài đặt chung"
    files:
      - name: "company"
        label: "Thông tin công ty"
        file: "data/company.json"
        fields:
          - { label: "Tên công ty", name: "company_name", widget: "string" }
          - { label: "Thương hiệu", name: "brand_name", widget: "string" }
          - { label: "Hotline", name: "hotline", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Website", name: "website", widget: "string" }
          - { label: "Địa chỉ VP", name: "office_address", widget: "string" }
          - { label: "Địa chỉ xưởng", name: "factory_address", widget: "string" }
          - { label: "Giờ làm việc", name: "working_hours", widget: "string" }
          - { label: "Zalo link", name: "zalo_link", widget: "string" }
          - { label: "Slogan", name: "slogan", widget: "string" }

  # ── NỘI DUNG TRANG ──
  - name: "pages"
    label: "📄 Nội dung trang"
    files:
      - name: "homepage"
        label: "Trang chủ"
        file: "data/homepage.json"
        fields:
          - { label: "Hero Question", name: "hero_question", widget: "string" }
          - { label: "Hero Sub", name: "hero_sub", widget: "text" }
          - { label: "S6 CTA Title", name: "s6_title", widget: "string" }
          - { label: "S6 CTA Sub", name: "s6_sub", widget: "text" }

      - name: "about"
        label: "Về tenD"
        file: "data/about.json"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string" }
          - { label: "Hero Body", name: "hero_body", widget: "text" }
          - { label: "Pull Quote", name: "pull_quote", widget: "text" }
          - label: "Giá trị cốt lõi"
            name: "values"
            widget: "list"
            max: 3
            fields:
              - { label: "Icon", name: "icon", widget: "string" }
              - { label: "Tiêu đề", name: "title", widget: "string" }
              - { label: "Mô tả", name: "body", widget: "text" }

  # ── DỊCH VỤ ──
  - name: "services"
    label: "🔧 Dịch vụ"
    label_singular: "Dịch vụ"
    folder: "content/services"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Số thứ tự", name: "number", widget: "string" }
      - { label: "Tên dịch vụ", name: "title", widget: "string" }
      - { label: "Slug URL", name: "slug", widget: "string" }
      - { label: "Mô tả ngắn", name: "subtitle", widget: "text" }
      - { label: "Nội dung chi tiết", name: "body", widget: "markdown", required: false }

  # ── DỰ ÁN ──
  - name: "projects"
    label: "🏠 Dự án"
    label_singular: "Dự án"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["year", "title"]
    fields:
      - { label: "Tên dự án", name: "title", widget: "string" }
      - { label: "Khu đô thị", name: "location", widget: "string" }
      - { label: "Tòa / Tầng", name: "building", widget: "string", required: false }
      - { label: "Diện tích (m²)", name: "area", widget: "number" }
      - { label: "Số phòng ngủ", name: "bedrooms", widget: "string" }
      - { label: "Phong cách", name: "style", widget: "select", options: ["Japandi", "Hiện đại", "Scandinavian", "Luxury", "Wabi-sabi", "Indochine", "Tân cổ điển"] }
      - { label: "Loại hình", name: "property_type", widget: "select", options: ["Chung cư", "Biệt thự", "Liền kề", "Shophouse"] }
      - { label: "Thời gian thi công (ngày)", name: "duration", widget: "number", required: false }
      - { label: "Năm hoàn thiện", name: "year", widget: "number" }
      - { label: "Mục đích", name: "purpose", widget: "select", options: ["Để ở", "Cho thuê", "Ở + cho thuê"] }
      - { label: "Giá thuê (triệu/tháng)", name: "rental_price", widget: "number", required: false }
      - { label: "Ảnh đại diện", name: "thumbnail", widget: "image", required: false }
      - { label: "Gallery ảnh", name: "gallery", widget: "list", required: false, field: { label: "Ảnh", name: "image", widget: "image" } }
      - { label: "Câu chuyện dự án", name: "body", widget: "markdown", required: false }
      - { label: "Hiển thị", name: "visible", widget: "boolean", default: true }

  # ── BLOG CHUNG CƯ ──
  - name: "blog_apartment"
    label: "📝 Blog Chung cư"
    label_singular: "Bài viết"
    folder: "content/blog/apartment"
    create: true
    slug: "{{slug}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Tiêu đề", name: "title", widget: "string" }
      - { label: "Slug URL", name: "slug", widget: "string" }
      - { label: "Ngày đăng", name: "date", widget: "datetime" }
      - { label: "Danh mục", name: "category", widget: "select", options: ["Hướng dẫn", "Tài chính", "Thiết kế", "Kinh nghiệm", "Vinhomes"] }
      - { label: "Thời gian đọc (phút)", name: "read_time", widget: "number", default: 5 }
      - { label: "Ảnh đại diện", name: "thumbnail", widget: "image", required: false }
      - { label: "Mô tả ngắn", name: "excerpt", widget: "text" }
      - { label: "Nội dung", name: "body", widget: "markdown" }

  # ── BLOG BIỆT THỰ ──
  - name: "blog_villa"
    label: "📝 Blog Biệt thự"
    label_singular: "Bài viết"
    folder: "content/blog/villa"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Tiêu đề", name: "title", widget: "string" }
      - { label: "Slug URL", name: "slug", widget: "string" }
      - { label: "Ngày đăng", name: "date", widget: "datetime" }
      - { label: "Danh mục", name: "category", widget: "select", options: ["Tài chính · Biệt thự", "Thiết kế · Biệt thự", "Vinhomes · Biệt thự", "Kinh nghiệm · Biệt thự"] }
      - { label: "Thời gian đọc (phút)", name: "read_time", widget: "number", default: 5 }
      - { label: "Ảnh đại diện", name: "thumbnail", widget: "image", required: false }
      - { label: "Mô tả ngắn", name: "excerpt", widget: "text" }
      - { label: "Nội dung", name: "body", widget: "markdown" }

  # ── TRANG PHÁP LÝ ──
  - name: "legal"
    label: "⚖️ Pháp lý"
    label_singular: "Trang"
    folder: "content/pages"
    create: false
    slug: "{{slug}}"
    fields:
      - { label: "Tiêu đề", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Cập nhật lần cuối", name: "last_updated", widget: "string" }
      - { label: "Nội dung", name: "body", widget: "markdown" }
